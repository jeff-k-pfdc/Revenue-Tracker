<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Revenue Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.5rem 2rem;
      border-bottom: 1px solid #1e293b;
    }

    header h1 { font-size: 1.5rem; font-weight: 600; }

    .sync-info {
      display: flex;
      align-items: center;
      gap: 1rem;
      font-size: 0.85rem;
      color: #94a3b8;
    }

    .sync-info button {
      background: #3b82f6;
      color: white;
      border: none;
      padding: 0.4rem 1rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
    }
    .sync-info button:hover { background: #2563eb; }
    .sync-info button:disabled { opacity: 0.5; cursor: not-allowed; }

    .totals {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      padding: 1.5rem 2rem;
    }

    .card {
      background: #1e293b;
      border-radius: 10px;
      padding: 1.25rem;
    }
    .card .label { font-size: 0.8rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; }
    .card .value { font-size: 1.75rem; font-weight: 700; margin-top: 0.25rem; }
    .card .sub { font-size: 0.85rem; color: #64748b; margin-top: 0.25rem; }
    .green { color: #4ade80; }
    .red { color: #f87171; }
    .blue { color: #60a5fa; }

    .charts {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      padding: 0 2rem 2rem;
    }

    @media (max-width: 900px) {
      .charts { grid-template-columns: 1fr; }
    }

    .chart-card {
      background: #1e293b;
      border-radius: 10px;
      padding: 1.25rem;
    }

    .chart-card h2 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 1rem;
    }

    .chart-card canvas { width: 100% !important; }

    .state-table-wrap {
      padding: 0 2rem 2rem;
    }

    .state-table-wrap h2 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 1rem;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #1e293b;
      border-radius: 10px;
      overflow: hidden;
    }

    th, td {
      padding: 0.75rem 1rem;
      text-align: left;
    }

    th {
      background: #334155;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #94a3b8;
    }

    tr:not(:last-child) td { border-bottom: 1px solid #334155; }
    td.num { text-align: right; font-variant-numeric: tabular-nums; }

    .filters-section {
      padding: 0 2rem 2rem;
    }

    .filters-section h2 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
    }

    .filter-form {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .filter-form input {
      flex: 1;
      max-width: 350px;
      padding: 0.5rem 0.75rem;
      border-radius: 6px;
      border: 1px solid #334155;
      background: #1e293b;
      color: #e2e8f0;
      font-size: 0.9rem;
    }

    .filter-form button {
      background: #ef4444;
      color: white;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
    }
    .filter-form button:hover { background: #dc2626; }

    .filter-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .filter-tag {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: #334155;
      padding: 0.3rem 0.6rem;
      border-radius: 20px;
      font-size: 0.8rem;
    }

    .filter-tag .remove-btn {
      background: none;
      border: none;
      color: #f87171;
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
      padding: 0;
    }
    .filter-tag .remove-btn:hover { color: #ef4444; }
    .filter-tag.keyword { background: #422006; color: #fbbf24; }
  </style>
</head>
<body>
  <header>
    <h1>Revenue Tracker</h1>
    <div class="sync-info">
      <span id="last-sync">Loading...</span>
      <button id="sync-btn" onclick="manualSync()">Sync Now</button>
    </div>
  </header>

  <div class="totals" id="totals"></div>

  <div class="charts">
    <div class="chart-card">
      <h2>Monthly Sales vs Refunds</h2>
      <canvas id="monthlyChart"></canvas>
    </div>
    <div class="chart-card">
      <h2>Sales by State (Top 10)</h2>
      <canvas id="stateChart"></canvas>
    </div>
  </div>

  <div class="filters-section">
    <h2>Excluded Test Customers</h2>

    <div style="display:flex; gap:2rem; flex-wrap:wrap; margin-bottom:1rem;">
      <div>
        <div style="font-size:0.8rem; color:#94a3b8; text-transform:uppercase; letter-spacing:0.05em; margin-bottom:0.5rem;">Exclude by Keyword</div>
        <div class="filter-form">
          <input type="text" id="filter-keyword" placeholder='e.g. "test"' />
          <button onclick="addKeyword()">Add Keyword</button>
        </div>
        <div class="filter-tags" id="keyword-tags"></div>
      </div>
      <div>
        <div style="font-size:0.8rem; color:#94a3b8; text-transform:uppercase; letter-spacing:0.05em; margin-bottom:0.5rem;">Exclude by Exact Email</div>
        <div class="filter-form">
          <input type="email" id="filter-email" placeholder="user@example.com" />
          <button onclick="addEmail()">Add Email</button>
        </div>
        <div class="filter-tags" id="email-tags"></div>
      </div>
    </div>
  </div>

  <div class="state-table-wrap">
    <h2>All States</h2>
    <table>
      <thead><tr><th>State</th><th>Sales</th><th>Revenue</th></tr></thead>
      <tbody id="state-tbody"></tbody>
    </table>
  </div>

  <script>
    const fmt = (cents) => "$" + (cents / 100).toLocaleString("en-US", { minimumFractionDigits: 2 });

    let monthlyChart, stateChart;

    async function loadAll() {
      await Promise.all([loadTotals(), loadMonthly(), loadStates(), loadSyncStatus()]);
    }

    async function loadTotals() {
      const data = await fetch("/api/totals").then((r) => r.json());
      document.getElementById("totals").innerHTML = `
        <div class="card"><div class="label">Total Sales</div><div class="value green">${fmt(data.sales.total_cents)}</div><div class="sub">${data.sales.count.toLocaleString()} transactions</div></div>
        <div class="card"><div class="label">Total Refunds</div><div class="value red">${fmt(data.refunds.total_cents)}</div><div class="sub">${data.refunds.count.toLocaleString()} refunds</div></div>
        <div class="card"><div class="label">Net Revenue</div><div class="value blue">${fmt(data.sales.total_cents - data.refunds.total_cents)}</div><div class="sub">After refunds</div></div>
      `;
    }

    async function loadMonthly() {
      const data = await fetch("/api/monthly").then((r) => r.json());
      const allMonths = [...new Set([...data.sales.map((s) => s.month), ...data.refunds.map((r) => r.month)])].sort();
      const salesMap = Object.fromEntries(data.sales.map((s) => [s.month, s.sales_cents / 100]));
      const refundMap = Object.fromEntries(data.refunds.map((r) => [r.month, r.refund_cents / 100]));

      const config = {
        type: "bar",
        data: {
          labels: allMonths,
          datasets: [
            { label: "Sales", data: allMonths.map((m) => salesMap[m] || 0), backgroundColor: "#4ade80" },
            { label: "Refunds", data: allMonths.map((m) => refundMap[m] || 0), backgroundColor: "#f87171" },
          ],
        },
        options: {
          responsive: true,
          plugins: { legend: { labels: { color: "#94a3b8" } } },
          scales: {
            x: { ticks: { color: "#64748b" }, grid: { color: "#1e293b" } },
            y: { ticks: { color: "#64748b", callback: (v) => "$" + v.toLocaleString() }, grid: { color: "#334155" } },
          },
        },
      };

      if (monthlyChart) { monthlyChart.data = config.data; monthlyChart.update(); }
      else { monthlyChart = new Chart(document.getElementById("monthlyChart"), config); }
    }

    async function loadStates() {
      const data = await fetch("/api/sales-by-state").then((r) => r.json());
      const top10 = data.slice(0, 10);

      const config = {
        type: "bar",
        data: {
          labels: top10.map((s) => s.state),
          datasets: [{ label: "Revenue", data: top10.map((s) => s.total_cents / 100), backgroundColor: "#60a5fa" }],
        },
        options: {
          indexAxis: "y",
          responsive: true,
          plugins: { legend: { display: false } },
          scales: {
            x: { ticks: { color: "#64748b", callback: (v) => "$" + v.toLocaleString() }, grid: { color: "#334155" } },
            y: { ticks: { color: "#94a3b8" }, grid: { display: false } },
          },
        },
      };

      if (stateChart) { stateChart.data = config.data; stateChart.update(); }
      else { stateChart = new Chart(document.getElementById("stateChart"), config); }

      document.getElementById("state-tbody").innerHTML = data
        .map((s) => `<tr><td>${s.state}</td><td class="num">${s.count.toLocaleString()}</td><td class="num">${fmt(s.total_cents)}</td></tr>`)
        .join("");
    }

    async function loadSyncStatus() {
      const data = await fetch("/api/sync-status").then((r) => r.json());
      const last = data.lastChargesSync ? new Date(data.lastChargesSync).toLocaleString() : "Never";
      document.getElementById("last-sync").textContent = `Last sync: ${last}`;
    }

    async function manualSync() {
      const btn = document.getElementById("sync-btn");
      btn.disabled = true;
      btn.textContent = "Syncing...";
      try {
        await fetch("/api/sync", { method: "POST" });
        await loadAll();
      } catch (e) {
        alert("Sync failed: " + e.message);
      } finally {
        btn.disabled = false;
        btn.textContent = "Sync Now";
      }
    }

    const noFiltersMsg = '<span style="color:#64748b;font-size:0.85rem">None</span>';

    async function loadFilters() {
      const data = await fetch("/api/filters").then((r) => r.json());

      const kwContainer = document.getElementById("keyword-tags");
      kwContainer.innerHTML = data.excluded_keywords.length === 0
        ? noFiltersMsg
        : data.excluded_keywords
            .map((kw) => `<span class="filter-tag keyword">"${kw}" <button class="remove-btn" onclick="removeKeyword('${kw}')">&times;</button></span>`)
            .join("");

      const emContainer = document.getElementById("email-tags");
      emContainer.innerHTML = data.excluded_emails.length === 0
        ? noFiltersMsg
        : data.excluded_emails
            .map((email) => `<span class="filter-tag">${email} <button class="remove-btn" onclick="removeEmail('${email}')">&times;</button></span>`)
            .join("");
    }

    async function refreshAfterFilter() {
      await Promise.all([loadFilters(), loadTotals(), loadMonthly(), loadStates()]);
    }

    async function addKeyword() {
      const input = document.getElementById("filter-keyword");
      const keyword = input.value.trim();
      if (!keyword) return;
      await fetch("/api/filters/keyword", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ keyword }),
      });
      input.value = "";
      await refreshAfterFilter();
    }

    async function removeKeyword(keyword) {
      await fetch("/api/filters/keyword", {
        method: "DELETE",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ keyword }),
      });
      await refreshAfterFilter();
    }

    async function addEmail() {
      const input = document.getElementById("filter-email");
      const email = input.value.trim();
      if (!email) return;
      await fetch("/api/filters/email", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email }),
      });
      input.value = "";
      await refreshAfterFilter();
    }

    async function removeEmail(email) {
      await fetch("/api/filters/email", {
        method: "DELETE",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email }),
      });
      await refreshAfterFilter();
    }

    // Auto-refresh dashboard every 5 minutes
    loadAll();
    loadFilters();
    setInterval(loadAll, 300_000);
  </script>
</body>
</html>
